// GitHub Backend — lee/escribe datos_okr.json vía GitHub API
// ══════════════════════════════════════════════════════════════
const GITHUB_API = "https://api.github.com";
let ghConfig = (() => {
  try { return JSON.parse(localStorage.getItem("gh_config") || "{}"); }
  catch(e) { return {}; }
})();
let currentSha = null;

async function ghFetchData() {
  const { owner, repo, token } = ghConfig;
  if (!owner || !repo) return null;
  const url = `${GITHUB_API}/repos/${owner}/${repo}/contents/datos_okr.json`;
  const headers = { "Accept": "application/vnd.github.v3+json" };
  if (token) headers["Authorization"] = `token ${token}`;
  try {
    const resp = await fetch(url, { headers });
    if (!resp.ok) { console.warn("GitHub fetch:", resp.status); return null; }
    const file = await resp.json();
    currentSha = file.sha;
    return JSON.parse(atob(file.content.replace(/\n/g, "")));
  } catch(e) { console.error("ghFetchData", e); return null; }
}

async function ghSaveData(data) {
  const { owner, repo, token } = ghConfig;
  if (!owner || !repo || !token) { console.warn("GitHub no configurado"); return; }
  const url = `${GITHUB_API}/repos/${owner}/${repo}/contents/datos_okr.json`;
  const raw = JSON.stringify(data, null, 2);
  // btoa con soporte Unicode
  const content = btoa(
    encodeURIComponent(raw).replace(/%([0-9A-F]{2})/g,
      (_, p1) => String.fromCharCode(parseInt(p1, 16)))
  );
  const resp = await fetch(url, {
    method: "PUT",
    headers: {
      "Authorization": `token ${token}`,
      "Content-Type": "application/json",
      "Accept": "application/vnd.github.v3+json"
    },
    body: JSON.stringify({ message: "OKR update", content, sha: currentSha })
  });
  if (!resp.ok) {
    const txt = await resp.text();
    console.error("GitHub save error:", resp.status, txt);
    throw new Error(`GitHub save ${resp.status}`);
  }
  const r = await resp.json();
  currentSha = r.content.sha;
}

function saveGhConfig(cfg) {
  ghConfig = cfg;
  localStorage.setItem("gh_config", JSON.stringify(cfg));
}

function diasEnMes(m,a){ return new Date(a,m+1,0).getDate(); }
function disp(min,tot){ return Math.max(0,((tot-min)/tot)*100); }
function badge(v){ return v>=META?{bg:"#d1fae5",c:"#065f46",l:"Cumple"}:v>=99?{bg:"#fef9c3",c:"#854d0e",l:"En riesgo"}:{bg:"#fee2e2",c:"#991b1b",l:"Incumple"}; }
function calcDur(inc){
  if(!inc.fechaInicio||!inc.horaInicio||!inc.fechaFin||!inc.horaFin) return null;
  const d=Math.round((new Date(`${inc.fechaFin}T${inc.horaFin}`)-new Date(`${inc.fechaInicio}T${inc.horaInicio}`))/60000);
  return d>0?d:null;
}
function newIncObj(id){ return { id, descripcion:"", fechaInicio:"", horaInicio:"", fechaFin:"", horaFin:"", ticket:"", areaImpacto:"Infraestructura", sistemaAfectado:"", clasificacion:"Medio", factores:[], tipoActivo:"", causa:"", impacto:"", accion:"", accionesPreventivas:"", leccionesAprendidas:"", comentarios:"", _duracionMin:null, dia:1, _saved:false }; }

const now = new Date();

function App() {
  const [mes, setMes] = useState(now.getMonth());
  const [anio, setAnio] = useState(now.getFullYear());
  const [tab, setTab] = useState(0);
  const [minutos, setMinutos] = useState({});
  const [incidentes, setIncidentes] = useState({});
  const [proyFiltro, setProyFiltro] = useState(PROYECTOS[0]);
  const [counter, setCounter] = useState(1);
  const [saving, setSaving] = useState(false);
  const [lastSaved, setLastSaved] = useState(null);
  const [incFiltro, setIncFiltro] = useState("Todos");
  // vista: "list" | "form" | "detail"
  const [vista, setVista] = useState("list");
  const [activeInc, setActiveInc] = useState(null); // { proy, i }
  const [drafts, setDrafts] = useState({}); // borradores en edición

  const [showConfig, setShowConfig] = useState(!ghConfig.owner);
  const [configMsg, setConfigMsg] = useState("");

  useEffect(() => {
    if (!ghConfig.owner) return;
    ghFetchData().then(d => {
      if (!d) return;
      if(d.incs) setIncidentes(d.incs);
      if(d.counter) setCounter(d.counter);
      if(d.minutos) setMinutos(d.minutos);
    }).catch(() => {});
  }, []);

  const persist = (ni, nc, nm) => {
    setSaving(true);
    ghSaveData({incs: ni, counter: nc, minutos: nm})
    .then(() => setLastSaved(new Date()))
    .catch(e => console.error(e))
    .finally(() => setSaving(false));
  };

  const dias = diasEnMes(mes,anio);
  const minDay=1440, limMes=Math.round(dias*minDay*(1-META/100));
  const getMin = (p,d) => Number(minutos[`${anio}-${mes}-${p}-${d}`]||0);
  const setMinVal = (p,d,v) => { const val=Math.max(0,Math.min(1440,Number(v)||0)),nm={...minutos,[`${anio}-${mes}-${p}-${d}`]:val}; setMinutos(nm); persist(incidentes,counter,nm); };
  const minMes = p => Array.from({length:dias},(_,i)=>getMin(p,i+1)).reduce((a,b)=>a+b,0);
  const dispMes = p => disp(minMes(p),dias*minDay);
  const getIncs = p => incidentes[`${anio}-${mes}-${p}`]||[];

  const resumen = useMemo(()=>PROYECTOS.map(p=>{ const mm=minMes(p),d=dispMes(p),b=badge(d); return {p,mm,d,b,margen:limMes-mm}; }),[minutos,mes,anio,dias]);
  const promedio = resumen.reduce((a,r)=>a+r.d,0)/resumen.length;
  const cumplidos = resumen.filter(r=>r.d>=META).length;
  const totalIncMes = PROYECTOS.reduce((a,p)=>a+getIncs(p).filter(x=>x._saved).length,0);

  // Draft helpers
  const getDraft = (p,i) => drafts[`${p}-${i}`] || getIncs(p)[i];
  const setDraft = (p,i,inc) => setDrafts(prev=>({...prev,[`${p}-${i}`]:inc}));
  const clearDraft = (p,i) => { const d={...drafts}; delete d[`${p}-${i}`]; setDrafts(d); };

  const openNew = (p) => {
    const nc=counter+1, id=`INC-${String(counter).padStart(4,"0")}`;
    const ni={...incidentes,[`${anio}-${mes}-${p}`]:[...getIncs(p), newIncObj(id)]};
    const idx=ni[`${anio}-${mes}-${p}`].length-1;
    setCounter(nc); setIncidentes(ni);
    setDraft(p, idx, ni[`${anio}-${mes}-${p}`][idx]);
    setActiveInc({proy:p, i:idx});
    setVista("form");
  };

  const openEdit = (p,i) => { setDraft(p,i,getIncs(p)[i]); setActiveInc({proy:p,i}); setVista("form"); };
  const openDetail = (p,i) => { setActiveInc({proy:p,i}); setVista("detail"); };

  const saveInc = () => {
    const {proy,i}=activeInc;
    const draft=getDraft(proy,i);
    const dur=calcDur(draft);
    const final={...draft,_saved:true,_duracionMin:dur};
    if(dur!==null){
      const diaInc=draft.fechaInicio?new Date(draft.fechaInicio+"T12:00").getDate():draft.dia;
      final.dia=diaInc;
      const nm={...minutos,[`${anio}-${mes}-${proy}-${diaInc}`]:dur};
      setMinutos(nm);
      const arr=[...getIncs(proy)]; arr[i]=final;
      const ni={...incidentes,[`${anio}-${mes}-${proy}`]:arr};
      setIncidentes(ni); clearDraft(proy,i); persist(ni,counter,nm);
    } else {
      const arr=[...getIncs(proy)]; arr[i]=final;
      const ni={...incidentes,[`${anio}-${mes}-${proy}`]:arr};
      setIncidentes(ni); clearDraft(proy,i); persist(ni,counter,minutos);
    }
    setVista("list");
  };

  const cancelForm = () => {
    const {proy,i}=activeInc;
    const inc=getIncs(proy)[i];
    if(!inc._saved){ const arr=[...getIncs(proy)]; arr.splice(i,1); const ni={...incidentes,[`${anio}-${mes}-${proy}`]:arr}; setIncidentes(ni); }
    clearDraft(proy,i); setVista("list");
  };

  const delInc = (p,i) => { const arr=[...getIncs(p)]; arr.splice(i,1); const ni={...incidentes,[`${anio}-${mes}-${p}`]:arr}; setIncidentes(ni); persist(ni,counter,minutos); };

  const updDraft = (field,val) => {
    const {proy,i}=activeInc;
    setDraft(proy,i,{...getDraft(proy,i),[field]:val});
  };
  const toggleFactorDraft = (f) => {
    const {proy,i}=activeInc, d=getDraft(proy,i), fs=d.factores||[];
    setDraft(proy,i,{...d,factores:fs.includes(f)?fs.filter(x=>x!==f):[...fs,f]});
  };

  const inp = (ex={}) => ({background:"var(--color-background-secondary)",border:"1px solid var(--color-border-primary)",borderRadius:6,color:"var(--color-text-primary)",fontFamily:"var(--font-sans)",fontSize:12,padding:"5px 8px",outline:"none",...ex});
  const tabStyle = i => ({padding:"8px 16px",border:"none",cursor:"pointer",fontSize:13,fontWeight:500,background:tab===i?"var(--color-background-primary)":"transparent",color:tab===i?"var(--color-text-primary)":"var(--color-text-secondary)",borderBottom:tab===i?"2px solid var(--color-text-primary)":"2px solid transparent",borderRadius:"8px 8px 0 0"});
  const lbl = (txt,color="#c2410c") => <div style={{fontSize:10,fontWeight:500,color,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>{txt}</div>;
  const fInp = (ex={}) => ({...inp(),width:"100%",background:"#fff8f1",border:"1px solid #fed7aa",...ex});

  // ---- FORM VIEW ----
  if(vista==="form" && activeInc){
    const {proy,i}=activeInc, draft=getDraft(proy,i), dur=calcDur(draft);
    const [clasBg,clasC]=(CLAS_COLORS[draft.clasificacion]||"#f3f4f6,#374151").split(",");
    const ta=(k,ph,rows=3)=><textarea value={draft[k]||""} onChange={e=>updDraft(k,e.target.value)} placeholder={ph} style={{...fInp(),minHeight:rows*22,resize:"vertical",lineHeight:1.5,fontFamily:"var(--font-sans)"}}/>;
    const ti=(k,ph,type="text",ex={})=><input type={type} value={draft[k]||""} onChange={e=>updDraft(k,e.target.value)} placeholder={ph} style={{...fInp(),...ex}}/>;
    return (
      <div style={{maxWidth:980,margin:"0 auto",padding:"14px 8px",fontFamily:"var(--font-sans)"}}>
        {/* Barra superior form */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div>
            <span style={{fontFamily:"var(--font-mono)",fontSize:13,fontWeight:600,color:"#9a3412",background:"#fed7aa",padding:"3px 10px",borderRadius:8,marginRight:10}}>{draft.id}</span>
            <span style={{fontSize:14,fontWeight:500,color:"var(--color-text-primary)"}}>{proy}</span>
            <span style={{marginLeft:8,fontSize:11,padding:"2px 10px",borderRadius:20,background:clasBg,color:clasC,fontWeight:600}}>{draft.clasificacion}</span>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={cancelForm} style={{padding:"7px 18px",borderRadius:8,border:"1px solid var(--color-border-primary)",background:"transparent",cursor:"pointer",fontSize:13,color:"var(--color-text-secondary)"}}>Cancelar</button>
            <button onClick={saveInc} style={{padding:"7px 22px",borderRadius:8,border:"none",background:"#1e293b",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:500}}>Guardar incidente</button>
          </div>
        </div>

        <div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:12,padding:"20px"}}>
          {/* descripción */}
          <div style={{marginBottom:12}}>{lbl("Descripción de la incidencia")}{ta("descripcion","Describe brevemente qué ocurrió...",2)}</div>
          {/* fechas */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:8}}>
            {[{l:"Fecha inicio",k:"fechaInicio",t:"date"},{l:"Hora inicio",k:"horaInicio",t:"time"},{l:"Fecha fin",k:"fechaFin",t:"date"},{l:"Hora fin",k:"horaFin",t:"time"}].map(({l,k,t})=>(
              <div key={k}>{lbl(l)}{ti(k,"",t)}</div>
            ))}
          </div>
          {dur!==null&&(
            <div style={{marginBottom:12,display:"inline-flex",alignItems:"center",gap:8,background:"#dbeafe",borderRadius:8,padding:"5px 12px"}}>
              <span style={{fontSize:11,fontWeight:500,color:"#1d4ed8"}}>Duración calculada:</span>
              <span style={{fontSize:14,fontWeight:600,color:"#1d4ed8"}}>{Math.floor(dur/60)}h {dur%60}min ({dur} min)</span>
              <span style={{fontSize:10,color:"#1d4ed8",background:"#bfdbfe",borderRadius:6,padding:"1px 7px"}}>✓ Se aplicará al día {draft.dia}</span>
            </div>
          )}
          {/* fila meta */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:12}}>
            <div>{lbl("Ticket Freshdesk")}{ti("ticket","#00000")}</div>
            <div>{lbl("Área de impacto")}<select value={draft.areaImpacto||"Infraestructura"} onChange={e=>updDraft("areaImpacto",e.target.value)} style={fInp()}>{AREAS_IMPACTO.map(a=><option key={a}>{a}</option>)}</select></div>
            <div>{lbl("Clasificación")}<select value={draft.clasificacion||"Medio"} onChange={e=>updDraft("clasificacion",e.target.value)} style={fInp()}>{CLASIFICACION.map(c=><option key={c}>{c}</option>)}</select></div>
            <div>{lbl("Sistema afectado")}<select value={draft.sistemaAfectado||""} onChange={e=>updDraft("sistemaAfectado",e.target.value)} style={fInp()}><option value="">Selecciona...</option>{SISTEMAS.map(s=><option key={s}>{s}</option>)}</select></div>
            <div>{lbl("Tipo de activo afectado")}{ti("tipoActivo","Ej: Servidor, Switch...")}</div>
          </div>
          {/* factores */}
          <div style={{marginBottom:12}}>{lbl("Factores que contribuyeron")}
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {FACTORES.map(f=>{ const sel=(draft.factores||[]).includes(f); return (
                <button key={f} onClick={()=>toggleFactorDraft(f)} style={{padding:"4px 12px",borderRadius:20,border:`1px solid ${sel?"#c2410c":"#fed7aa"}`,cursor:"pointer",fontSize:12,fontWeight:500,background:sel?"#9a3412":"#fff8f1",color:sel?"#fff":"#9a3412"}}>{f}</button>
              );})}
            </div>
          </div>
          {/* causa/impacto/accion */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
            <div>{lbl("Causa raíz")}{ta("causa","Describe la causa raíz...")}</div>
            <div>{lbl("Impacto")}{ta("impacto","Describe el impacto...")}</div>
            <div>{lbl("Acción correctiva")}{ta("accion","Describe la acción correctiva...")}</div>
          </div>
          {/* preventivas/lecciones */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            <div>{lbl("Acciones preventivas (mediano y largo plazo)")}{ta("accionesPreventivas","Describe las acciones preventivas...")}</div>
            <div>{lbl("Lecciones aprendidas")}{ta("leccionesAprendidas","¿Qué aprendimos de este incidente?")}</div>
          </div>
          {/* comentarios */}
          <div>{lbl("Comentarios y observaciones adicionales")}{ta("comentarios","Notas adicionales, seguimiento pendiente...",2)}</div>
        </div>

        <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:14}}>
          <button onClick={cancelForm} style={{padding:"8px 20px",borderRadius:8,border:"1px solid var(--color-border-primary)",background:"transparent",cursor:"pointer",fontSize:13,color:"var(--color-text-secondary)"}}>Cancelar</button>
          <button onClick={saveInc} style={{padding:"8px 26px",borderRadius:8,border:"none",background:"#1e293b",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:500}}>Guardar incidente</button>
        </div>
      </div>
    );
  }

  // ---- DETAIL VIEW ----
  if(vista==="detail" && activeInc){
    const {proy,i}=activeInc, inc=getIncs(proy)[i];
    if(!inc) { setVista("list"); return null; }
    const dur=inc._duracionMin||calcDur(inc);
    const [clasBg,clasC]=(CLAS_COLORS[inc.clasificacion]||"#f3f4f6,#374151").split(",");
    const Row=({label,value})=>value?(
      <div style={{marginBottom:12}}>
        <div style={{fontSize:10,fontWeight:500,color:"var(--color-text-secondary)",textTransform:"uppercase",letterSpacing:0.5,marginBottom:3}}>{label}</div>
        <div style={{fontSize:13,color:"var(--color-text-primary)",lineHeight:1.6,background:"var(--color-background-secondary)",borderRadius:8,padding:"8px 12px"}}>{value}</div>
      </div>
    ):null;
    return (
      <div style={{maxWidth:980,margin:"0 auto",padding:"14px 8px",fontFamily:"var(--font-sans)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <button onClick={()=>setVista("list")} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 14px",borderRadius:8,border:"1px solid var(--color-border-primary)",background:"transparent",cursor:"pointer",fontSize:13,color:"var(--color-text-secondary)"}}>← Volver</button>
          <button onClick={()=>openEdit(proy,i)} style={{padding:"7px 18px",borderRadius:8,border:"none",background:"#1e293b",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:500}}>Editar incidente</button>
        </div>
        <div style={{background:"var(--color-background-primary)",border:"1px solid var(--color-border-tertiary)",borderRadius:12,overflow:"hidden"}}>
          {/* Header detalle */}
          <div style={{background:clasBg,padding:"16px 20px",borderBottom:"1px solid var(--color-border-tertiary)"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
              <span style={{fontFamily:"var(--font-mono)",fontSize:13,fontWeight:700,color:clasC,background:"rgba(255,255,255,0.6)",padding:"3px 10px",borderRadius:8}}>{inc.id}</span>
              <span style={{fontSize:12,fontWeight:600,padding:"2px 10px",borderRadius:20,background:"rgba(255,255,255,0.5)",color:clasC}}>{inc.clasificacion}</span>
              {inc.areaImpacto&&<span style={{fontSize:12,color:clasC,fontWeight:500}}>· {inc.areaImpacto}</span>}
            </div>
            <div style={{fontSize:15,fontWeight:500,color:clasC}}>{proy}</div>
            {inc.descripcion&&<div style={{fontSize:13,color:clasC,marginTop:4,lineHeight:1.5}}>{inc.descripcion}</div>}
          </div>
          <div style={{padding:"20px"}}>
            {/* Timeline */}
            {(inc.fechaInicio||inc.fechaFin)&&(
              <div style={{display:"flex",gap:20,marginBottom:16,flexWrap:"wrap"}}>
                {inc.fechaInicio&&<div style={{background:"var(--color-background-secondary)",borderRadius:8,padding:"8px 14px"}}>
                  <div style={{fontSize:10,fontWeight:500,color:"var(--color-text-secondary)",textTransform:"uppercase",letterSpacing:0.5}}>Inicio</div>
                  <div style={{fontSize:14,fontWeight:500,color:"var(--color-text-primary)"}}>{inc.fechaInicio} {inc.horaInicio}</div>
                </div>}
                {inc.fechaFin&&<div style={{background:"var(--color-background-secondary)",borderRadius:8,padding:"8px 14px"}}>
                  <div style={{fontSize:10,fontWeight:500,color:"var(--color-text-secondary)",textTransform:"uppercase",letterSpacing:0.5}}>Fin</div>
                  <div style={{fontSize:14,fontWeight:500,color:"var(--color-text-primary)"}}>{inc.fechaFin} {inc.horaFin}</div>
                </div>}
                {dur&&<div style={{background:"#dbeafe",borderRadius:8,padding:"8px 14px"}}>
                  <div style={{fontSize:10,fontWeight:500,color:"#1d4ed8",textTransform:"uppercase",letterSpacing:0.5}}>Duración</div>
                  <div style={{fontSize:14,fontWeight:600,color:"#1d4ed8"}}>{Math.floor(dur/60)}h {dur%60}min</div>
                </div>}
                {inc.ticket&&<div style={{background:"var(--color-background-secondary)",borderRadius:8,padding:"8px 14px"}}>
                  <div style={{fontSize:10,fontWeight:500,color:"var(--color-text-secondary)",textTransform:"uppercase",letterSpacing:0.5}}>Ticket Freshdesk</div>
                  <div style={{fontSize:14,fontWeight:500,color:"var(--color-text-primary)"}}>{inc.ticket}</div>
                </div>}
              </div>
            )}
            {/* Metadata chips */}
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
              {inc.sistemaAfectado&&<span style={{fontSize:12,background:"#f1f5f9",color:"#475569",padding:"3px 10px",borderRadius:20,fontWeight:500}}>Sistema: {inc.sistemaAfectado}</span>}
              {inc.tipoActivo&&<span style={{fontSize:12,background:"#f1f5f9",color:"#475569",padding:"3px 10px",borderRadius:20,fontWeight:500}}>Activo: {inc.tipoActivo}</span>}
              {(inc.factores||[]).map(f=><span key={f} style={{fontSize:12,background:"#fff7ed",color:"#9a3412",padding:"3px 10px",borderRadius:20,fontWeight:500,border:"1px solid #fed7aa"}}>{f}</span>)}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:4}}>
              <Row label="Causa raíz" value={inc.causa}/>
              <Row label="Impacto" value={inc.impacto}/>
              <Row label="Acción correctiva" value={inc.accion}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:4}}>
              <Row label="Acciones preventivas (mediano y largo plazo)" value={inc.accionesPreventivas}/>
              <Row label="Lecciones aprendidas" value={inc.leccionesAprendidas}/>
            </div>
            <Row label="Comentarios y observaciones adicionales" value={inc.comentarios}/>
          </div>
        </div>
      </div>
    );
  }

  // ---- LIST VIEW ----
  const todosIncs = PROYECTOS.flatMap(p=>getIncs(p).filter(x=>x._saved).map((inc,i)=>({...inc,_proy:p,_i:i})));
  const incsFiltrados = incFiltro==="Todos"?todosIncs:todosIncs.filter(inc=>inc._proy===incFiltro||inc.clasificacion===incFiltro);


  // ── Modal configuración GitHub ──
  const configModal = showConfig ? (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:12,padding:28,width:380,maxWidth:"95vw",boxShadow:"0 8px 32px rgba(0,0,0,0.18)"}}>
        <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>⚙ Configuración GitHub</div>
        <div style={{fontSize:12,color:"#6b7280",marginBottom:16}}>
          Conecta el tablero al repositorio donde vive <code>datos_okr.json</code>
        </div>
        {[
          ["owner","Usuario / Organización","tu-usuario"],
          ["repo","Nombre del repositorio","okr-disponibilidad"],
          ["token","Personal Access Token (repo write)","ghp_..."],
        ].map(([key,label,ph])=>(
          <div key={key} style={{marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>{label}</div>
            <input
              type={key==="token"?"password":"text"}
              defaultValue={ghConfig[key]||""}
              placeholder={ph}
              id={`gh_${key}`}
              style={{width:"100%",boxSizing:"border-box",padding:"7px 10px",border:"1px solid #d1d5db",borderRadius:7,fontSize:13}}
            />
          </div>
        ))}
        {configMsg && <div style={{color:"#dc2626",fontSize:12,marginBottom:8}}>{configMsg}</div>}
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          {ghConfig.owner && (
            <button onClick={()=>setShowConfig(false)}
              style={{padding:"7px 16px",borderRadius:7,border:"1px solid #d1d5db",cursor:"pointer",background:"#f9fafb",fontSize:13}}>
              Cancelar
            </button>
          )}
          <button onClick={()=>{
            const cfg = {
              owner: document.getElementById("gh_owner").value.trim(),
              repo:  document.getElementById("gh_repo").value.trim(),
              token: document.getElementById("gh_token").value.trim(),
            };
            if (!cfg.owner || !cfg.repo || !cfg.token) { setConfigMsg("Completa todos los campos"); return; }
            saveGhConfig(cfg);
            setShowConfig(false);
            setConfigMsg("");
            // cargar datos con nueva config
            ghFetchData().then(d => {
              if (!d) return;
              if(d.incs) setIncidentes(d.incs);
              if(d.counter) setCounter(d.counter);
              if(d.minutos) setMinutos(d.minutos);
            });
          }} style={{padding:"7px 16px",borderRadius:7,border:"none",cursor:"pointer",background:"#1d4ed8",color:"#fff",fontWeight:600,fontSize:13}}>
            Guardar y conectar
          </button>
        </div>
      </div>
    </div>
  ) : null;

  return (
    <div style={{maxWidth:980,margin:"0 auto",padding:"14px 8px",fontFamily:"var(--font-sans)"}}>
      {configModal}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12,flexWrap:"wrap",gap:8}}>
        <div>
          <h2 style={{margin:0,fontSize:17,fontWeight:600,color:"var(--color-text-primary)"}}>OKR 1 Disponibilidad central de los Sistema Core</h2>
          <p style={{margin:"3px 0 0",fontSize:13,color:"var(--color-text-secondary)"}}>Meta mensual: {META}% · Registro diario por proyecto</p>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontSize:11,color:saving?"#1d4ed8":"var(--color-text-secondary)",background:saving?"#dbeafe":"var(--color-background-secondary)",padding:"4px 10px",borderRadius:8,border:"1px solid var(--color-border-tertiary)"}}>
            {saving?"Guardando...":lastSaved?`Guardado ${lastSaved.toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"})}`:"Sin cambios"}
          </div>
          <button onClick={()=>setShowConfig(true)} title="Configurar GitHub" style={{border:"1px solid var(--color-border-tertiary)",background:"var(--color-background-secondary)",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:13,color:ghConfig.owner?"#16a34a":"#dc2626"}}>
            {ghConfig.owner?"⚙ GitHub ✓":"⚙ Configurar GitHub"}
          </button>
          {/* Logo AutoTraffic original */}
          <img src={LOGO_AT} alt="AutoTraffic" style={{height:40,objectFit:"contain"}}/>
        </div>
      </div>

      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <select value={mes} onChange={e=>setMes(Number(e.target.value))} style={{...inp(),padding:"6px 12px",fontSize:14}}>
          {MESES.map((m,i)=><option key={i} value={i}>{m}</option>)}
        </select>
        <input type="number" value={anio} onChange={e=>setAnio(Number(e.target.value))} style={{...inp(),width:82,padding:"6px 10px",fontSize:14}}/>
        <span style={{fontSize:12,color:"var(--color-text-secondary)"}}>{dias} días · Máx. caída: <strong>{limMes} min</strong> por proyecto</span>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(155px,1fr))",gap:10,marginBottom:16}}>
        {[
          {l:"Disponibilidad promedio",v:promedio.toFixed(3)+"%",...badge(promedio)},
          {l:"Proyectos que cumplen",v:`${cumplidos} / ${PROYECTOS.length}`,bg:"#dbeafe",c:"#1d4ed8"},
          {l:"En riesgo/incumplimiento",v:PROYECTOS.length-cumplidos,bg:PROYECTOS.length-cumplidos>0?"#fee2e2":"#d1fae5",c:PROYECTOS.length-cumplidos>0?"#991b1b":"#065f46"},
          {l:"Incidentes registrados",v:totalIncMes,bg:"#f3f4f6",c:"#374151"},
        ].map(({l,v,bg,c})=>(
          <div key={l} style={{background:bg,borderRadius:10,padding:"10px 14px"}}>
            <div style={{fontSize:11,fontWeight:500,color:c,marginBottom:3}}>{l}</div>
            <div style={{fontSize:20,fontWeight:500,color:c}}>{v}</div>
          </div>
        ))}
      </div>

      <div style={{display:"flex",borderBottom:"1px solid var(--color-border-tertiary)"}}>
        {TABS.map((t,i)=><button key={i} style={tabStyle(i)} onClick={()=>setTab(i)}>{t}</button>)}
      </div>

      <div style={{background:"var(--color-background-primary)",border:"1px solid var(--color-border-tertiary)",borderTop:"none",borderRadius:"0 8px 8px 8px",overflow:"auto"}}>

        {/* TAB 0 */}
        {tab===0&&(
          <div>
            <div style={{display:"flex",gap:6,padding:"12px 14px",flexWrap:"wrap",borderBottom:"1px solid var(--color-border-tertiary)"}}>
              {PROYECTOS.map(p=>{ const d=dispMes(p),b=badge(d); return (
                <button key={p} onClick={()=>setProyFiltro(p)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${proyFiltro===p?"var(--color-text-primary)":"var(--color-border-primary)"}`,cursor:"pointer",fontSize:12,fontWeight:500,background:proyFiltro===p?"var(--color-text-primary)":b.bg,color:proyFiltro===p?"var(--color-background-primary)":b.c}}>{p}</button>
              );})}
            </div>
            {(()=>{ const p=proyFiltro,mm=minMes(p),d=dispMes(p),b=badge(d),margen=limMes-mm; return (
              <div style={{display:"flex",gap:12,padding:"10px 14px",borderBottom:"1px solid var(--color-border-tertiary)",flexWrap:"wrap"}}>
                <div style={{background:b.bg,borderRadius:8,padding:"8px 14px",minWidth:155}}><div style={{fontSize:11,color:b.c,fontWeight:500}}>Disponibilidad del mes</div><div style={{fontSize:22,fontWeight:500,color:b.c}}>{d.toFixed(3)}%</div></div>
                <div style={{background:"var(--color-background-secondary)",borderRadius:8,padding:"8px 14px",minWidth:140}}><div style={{fontSize:11,color:"var(--color-text-secondary)",fontWeight:500}}>Total minutos caída</div><div style={{fontSize:22,fontWeight:500,color:"var(--color-text-primary)"}}>{mm} min</div></div>
                <div style={{background:margen>=0?"#d1fae5":"#fee2e2",borderRadius:8,padding:"8px 14px",minWidth:140}}><div style={{fontSize:11,color:margen>=0?"#065f46":"#991b1b",fontWeight:500}}>{margen>=0?"Margen disponible":"Minutos excedidos"}</div><div style={{fontSize:22,fontWeight:500,color:margen>=0?"#065f46":"#991b1b"}}>{Math.abs(margen)} min</div></div>
              </div>
            );})()}
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead><tr style={{background:"var(--color-background-secondary)"}}>
                  {["Día","Min. caída","Disponibilidad","Estado","Estado caída"].map(h=><th key={h} style={{padding:"8px 12px",textAlign:"left",fontSize:11,fontWeight:500,color:"var(--color-text-secondary)"}}>{h.toUpperCase()}</th>)}
                </tr></thead>
                <tbody>
                  {Array.from({length:dias},(_,idx)=>{ const dia=idx+1,m=getMin(proyFiltro,dia),d=disp(m,minDay),b=badge(d),fecha=new Date(anio,mes,dia),esHoy=fecha.toDateString()===now.toDateString(),esFut=fecha>now; return (
                    <tr key={dia} style={{borderBottom:"1px solid var(--color-border-tertiary)",background:esHoy?"var(--color-background-secondary)":"transparent",opacity:esFut?0.4:1}}>
                      <td style={{padding:"7px 12px",fontWeight:500,color:"var(--color-text-primary)"}}>
                        <span>{dia}</span>
                        <span style={{fontSize:10,color:"var(--color-text-secondary)",marginLeft:4}}>{["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"][fecha.getDay()]}</span>
                        {esHoy&&<span style={{marginLeft:4,fontSize:10,background:"#dbeafe",color:"#1d4ed8",padding:"1px 6px",borderRadius:10}}>Hoy</span>}
                      </td>
                      <td style={{padding:"7px 12px"}}><div style={{display:"flex",alignItems:"center",gap:8}}><input type="number" min={0} max={minDay} value={m} onChange={e=>setMinVal(proyFiltro,dia,e.target.value)} disabled={esFut} style={{...inp(),width:72,textAlign:"right"}}/>{m>0&&<span style={{fontSize:11,color:"var(--color-text-secondary)"}}>{Math.floor(m/60)}h {m%60}m</span>}</div></td>
                      <td style={{padding:"7px 12px",fontWeight:500,color:b.c}}>{esFut?"—":d.toFixed(3)+"%"}</td>
                      <td style={{padding:"7px 12px"}}>{!esFut&&<span style={{padding:"2px 10px",borderRadius:20,fontSize:11,fontWeight:500,background:b.bg,color:b.c}}>{b.l}</span>}</td>
                      <td style={{padding:"7px 12px",fontSize:12}}>{!esFut&&(m===0?<span style={{color:"#065f46"}}>Sin caídas</span>:<span style={{color:"#854d0e"}}>Caída registrada</span>)}</td>
                    </tr>
                  );})}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* TAB 1 */}
        {tab===1&&(
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr style={{background:"var(--color-background-secondary)"}}>
              {["Proyecto","Min. caída mes","Disponibilidad","Estado","Margen"].map(h=><th key={h} style={{padding:"10px 14px",textAlign:"left",fontWeight:500,color:"var(--color-text-secondary)",fontSize:11}}>{h.toUpperCase()}</th>)}
            </tr></thead>
            <tbody>
              {resumen.map(({p,mm,d,b,margen})=>(
                <tr key={p} style={{borderBottom:"1px solid var(--color-border-tertiary)"}}>
                  <td style={{padding:"10px 14px",fontWeight:500,color:"var(--color-text-primary)"}}>{p}</td>
                  <td style={{padding:"10px 14px",color:"var(--color-text-secondary)"}}>{mm} min {mm>0&&<span style={{fontSize:11}}>({Math.floor(mm/60)}h {mm%60}m)</span>}</td>
                  <td style={{padding:"10px 14px",fontWeight:600,color:b.c}}>{d.toFixed(3)}%</td>
                  <td style={{padding:"10px 14px"}}><span style={{padding:"2px 10px",borderRadius:20,fontSize:11,fontWeight:500,background:b.bg,color:b.c}}>{b.l}</span></td>
                  <td style={{padding:"10px 14px",fontSize:12,color:margen>=0?"#16a34a":"#dc2626"}}>{margen>=0?`+${margen} min disponibles`:`${Math.abs(margen)} min excedidos`}</td>
                </tr>
              ))}
            </tbody>
          </table>
        )}

        {/* TAB 2 */}
        {tab===2&&(
          <div style={{padding:"14px"}}>
            <div style={{marginBottom:14}}>
              {/* Filtro proyectos */}
              <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",marginBottom:8}}>
                <span style={{fontSize:11,fontWeight:500,color:"var(--color-text-secondary)",minWidth:52}}>Proyecto:</span>
                {["Todos",...PROYECTOS].map(f=>(
                  <button key={f} onClick={()=>setIncFiltro(f)}
                    style={{padding:"3px 10px",borderRadius:20,border:"1px solid var(--color-border-primary)",cursor:"pointer",fontSize:11,fontWeight:500,
                      background:incFiltro===f&&(f==="Todos"||PROYECTOS.includes(f))?"var(--color-text-primary)":"transparent",
                      color:incFiltro===f&&(f==="Todos"||PROYECTOS.includes(f))?"var(--color-background-primary)":"var(--color-text-secondary)"}}>
                    {f}
                  </button>
                ))}
              </div>
              {/* Filtro clasificación */}
              <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                <span style={{fontSize:11,fontWeight:500,color:"var(--color-text-secondary)",minWidth:52}}>Nivel:</span>
                {CLASIFICACION.map(f=>{
                  const [bg,c]=(CLAS_COLORS[f]||"#f3f4f6,#374151").split(",");
                  const active=incFiltro===f;
                  return (
                    <button key={f} onClick={()=>setIncFiltro(f)}
                      style={{padding:"3px 12px",borderRadius:6,border:`1px solid ${c}`,cursor:"pointer",fontSize:11,fontWeight:600,
                        background:active?c:bg, color:active?"#fff":c,
                        boxShadow:active?`0 0 0 2px ${c}44`:"none"}}>
                      {f}
                    </button>
                  );
                })}
              </div>
            </div>

            {incFiltro!=="Todos"&&!PROYECTOS.includes(incFiltro)
              ? incsFiltrados.length===0
                ? <div style={{padding:20,textAlign:"center",color:"var(--color-text-secondary)",fontSize:13}}>Sin incidentes con clasificación "{incFiltro}".</div>
                : <IncTable incs={incsFiltrados} showProy onView={(p,i)=>openDetail(p,i)} onEdit={(p,i)=>openEdit(p,i)} onDel={(p,i)=>delInc(p,i)} CLAS_COLORS={CLAS_COLORS}/>
              : PROYECTOS.filter(p=>incFiltro==="Todos"||p===incFiltro).map(p=>(
                <div key={p} style={{marginBottom:18}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <span style={{fontWeight:500,fontSize:14,color:"var(--color-text-primary)"}}>{p}
                      {getIncs(p).filter(x=>x._saved).length>0&&<span style={{marginLeft:8,fontSize:11,background:"var(--color-background-secondary)",color:"var(--color-text-secondary)",padding:"1px 8px",borderRadius:10}}>{getIncs(p).filter(x=>x._saved).length} incidente{getIncs(p).filter(x=>x._saved).length!==1?"s":""}</span>}
                    </span>
                    <button onClick={()=>openNew(p)} style={{padding:"5px 14px",borderRadius:8,border:"1px dashed var(--color-border-primary)",background:"transparent",cursor:"pointer",fontSize:12,color:"var(--color-text-secondary)"}}>+ Nuevo incidente</button>
                  </div>
                  {getIncs(p).filter(x=>x._saved).length===0
                    ? <div style={{fontSize:12,color:"var(--color-text-secondary)",paddingBottom:8}}>Sin incidentes en {MESES[mes]}.</div>
                    : <IncTable incs={getIncs(p).filter(x=>x._saved).map((inc,i)=>({...inc,_proy:p,_i:i}))} onView={(pr,i)=>openDetail(pr,i)} onEdit={(pr,i)=>openEdit(pr,i)} onDel={(pr,i)=>delInc(pr,i)} CLAS_COLORS={CLAS_COLORS}/>
                  }
                  <div style={{height:1,background:"var(--color-border-tertiary)",margin:"6px 0 0"}}/>
                </div>
              ))
            }
          </div>
        )}
      </div>
    </div>
  );
}

function IncTable({ incs, showProy, onView, onEdit, onDel, CLAS_COLORS }) {
  return (
    <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,marginBottom:8}}>
      <thead>
        <tr style={{background:"var(--color-background-secondary)"}}>
          {["ID","Fecha","Sistema","Área","Clasificación","Duración",showProy?"Proyecto":"","Acciones"].filter(Boolean).map(h=>(
            <th key={h} style={{padding:"7px 12px",textAlign:"left",fontSize:11,fontWeight:500,color:"var(--color-text-secondary)"}}>{h.toUpperCase()}</th>
          ))}
        </tr>
      </thead>
      <tbody>
        {incs.map((inc,idx)=>{
          const [clasBg,clasC]=(CLAS_COLORS[inc.clasificacion]||"#f3f4f6,#374151").split(",");
          const dur=inc._duracionMin;
          return (
            <tr key={idx} style={{borderBottom:"1px solid var(--color-border-tertiary)"}}>
              <td style={{padding:"8px 12px"}}><span style={{fontFamily:"var(--font-mono)",fontSize:11,fontWeight:600,color:"#9a3412",background:"#fed7aa",padding:"2px 8px",borderRadius:6}}>{inc.id}</span></td>
              <td style={{padding:"8px 12px",fontSize:12,color:"var(--color-text-secondary)"}}>{inc.fechaInicio||"—"}</td>
              <td style={{padding:"8px 12px",fontSize:12,color:"var(--color-text-primary)"}}>{inc.sistemaAfectado||"—"}</td>
              <td style={{padding:"8px 12px",fontSize:12,color:"var(--color-text-secondary)"}}>{inc.areaImpacto||"—"}</td>
              <td style={{padding:"8px 12px"}}><span style={{fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:20,background:clasBg,color:clasC}}>{inc.clasificacion}</span></td>
              <td style={{padding:"8px 12px",fontSize:12,color:"var(--color-text-secondary)"}}>{dur?`${Math.floor(dur/60)}h ${dur%60}m`:"—"}</td>
              {showProy&&<td style={{padding:"8px 12px",fontSize:12,color:"var(--color-text-secondary)"}}>{inc._proy}</td>}
              <td style={{padding:"8px 12px"}}>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>onView(inc._proy,inc._i)} style={{padding:"3px 10px",borderRadius:6,border:"1px solid var(--color-border-primary)",background:"transparent",cursor:"pointer",fontSize:11,color:"var(--color-text-secondary)"}}>Ver</button>
                  <button onClick={()=>onEdit(inc._proy,inc._i)} style={{padding:"3px 10px",borderRadius:6,border:"1px solid var(--color-border-primary)",background:"transparent",cursor:"pointer",fontSize:11,color:"var(--color-text-secondary)"}}>Editar</button>
                  <button onClick={()=>onDel(inc._proy,inc._i)} style={{padding:"3px 10px",borderRadius:6,border:"none",background:"#fee2e2",cursor:"pointer",fontSize:11,color:"#991b1b"}}>×</button>
                </div>
              </td>
            </tr>
          );
        })}
      </tbody>
    </table>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

  </script>
</body>
</html>
